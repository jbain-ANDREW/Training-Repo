<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example Splash Page</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f3460;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .avatar {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 2rem;
    }

    .info {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 1.2rem 2rem;
      max-width: 420px;
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .info strong { opacity: 0.6; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; display: block; }

    .back {
      margin-top: 2rem;
      font-size: 0.85rem;
      opacity: 0.6;
    }
    .back a { color: white; }
  </style>
</head>
<body>

  <div class="avatar">🎓</div>

  <h1>Alex Example</h1>
  <p class="tagline">Student &mdash; Spring 2026</p>

  <div class="info">
    <strong>Major</strong>
    Electrical &amp; Computer Engineering
    <br><br>
    <strong>Fun fact</strong>
    I built this page with Git and VS Code.
    <br><br>
    <strong>Favorite tool</strong>
    The terminal
  </div>

  <p class="back"><a href="index.html">&larr; Back to archive</a></p>

</body>
</html>
