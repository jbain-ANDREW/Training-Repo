<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- STEP 1: Change the title to your name -->
  <title>Your Name Here</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;

      /* STEP 2: Change this background color to anything you like.
         Try a hex code like #2d6a4f or a name like "navy" or "darkslategray" */
      background: #1a1a2e;

      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .avatar {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    h1 { font-size: 2.2rem; margin-bottom: 0.4rem; }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 2rem;
    }

    .info {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 1.2rem 2rem;
      max-width: 420px;
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .info strong {
      opacity: 0.6;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
    }

    .back { margin-top: 2rem; font-size: 0.85rem; opacity: 0.6; }
    .back a { color: white; }
  </style>
</head>
<body>

  <!-- STEP 3: Pick an emoji that represents you -->
  <div class="avatar">🙂</div>

  <!-- STEP 4: Replace with your name -->
  <h1>Your Name Here</h1>

  <!-- STEP 5: Replace with your program / year -->
  <p class="tagline">Student &mdash; Spring 2026</p>

  <div class="info">

    <!-- STEP 6: Fill in each section with something real (or fun) about yourself -->

    <strong>Major</strong>
    Your major here
    <br><br>

    <strong>Fun fact</strong>
    Something interesting about you
    <br><br>

    <strong>Favorite tool / hobby / class</strong>
    Your answer here

  </div>

  <p class="back"><a href="index.html">&larr; Back to archive</a></p>

</body>
</html>
